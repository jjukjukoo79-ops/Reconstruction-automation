<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정비사업 실무 에이전트 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#f5f5f7;color:#1a1a1a;font-size:14px}
.header{background:#fff;border-bottom:1px solid #e5e5e5;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header .ht{font-size:16px;font-weight:600}.header .hs{font-size:11px;color:#888;margin-top:2px}
.stage-bar{display:flex;padding:10px 20px;gap:6px;background:#fff;border-bottom:1px solid #e5e5e5;overflow-x:auto}
.sp{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #ddd;white-space:nowrap;background:#f5f5f7;color:#666;transition:all .15s}
.sp:hover{background:#eee}.sp.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.diag-box{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:16px}
.sec-label{font-size:10px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.diag-row{display:flex;gap:8px}
.diag-input{flex:1;font-size:13px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit}
.diag-btn{font-size:12px;padding:9px 16px;border-radius:8px;cursor:pointer;border:1px solid #1a1a1a;background:#1a1a1a;color:#fff;font-family:inherit;font-weight:500;white-space:nowrap}
.diag-result{margin-top:10px;display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:11px 13px;font-size:12px;color:#1d4ed8;line-height:1.8}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-c{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px;text-align:center}
.stat-c .sn{font-size:20px;font-weight:600}.stat-c .sl{font-size:10px;color:#888;margin-top:2px}
.quick-row{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.qb{font-size:11px;padding:6px 13px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#444;font-family:inherit;transition:all .15s}
.qb:hover{background:#f0f0f0;border-color:#aaa}
.agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:600px){.agent-grid{grid-template-columns:1fr}}
.ac{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:5px}
.ac:hover{border-color:#60a5fa;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.ac.cur{border-color:#60a5fa;background:#eff6ff}
.ac .ai{font-size:22px;margin-bottom:2px}
.ac .an{font-size:13px;font-weight:600}
.ac .ad{font-size:11px;color:#666;line-height:1.5}
.ac .at{display:inline-block;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500;margin-top:3px}
.t2{background:#dcfce7;color:#166534}.t4{background:#fee2e2;color:#991b1b}.tall{background:#dbeafe;color:#1e40af}.t5{background:#f3f4f6;color:#374151}
.ac .arr{font-size:13px;color:#aaa;align-self:flex-end;margin-top:auto}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:500px;width:92%;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:8px}
.modal p{font-size:12px;color:#555;line-height:1.7;margin-bottom:14px}
.modal .steps{font-size:12px;color:#555;line-height:2.1;border-left:3px solid #60a5fa;padding-left:12px;margin-bottom:18px}
.mbtn-row{display:flex;gap:8px}
.ml{font-size:12px;padding:8px 18px;border-radius:8px;cursor:pointer;border:1px solid #1a1a1a;background:#1a1a1a;color:#fff;font-family:inherit;font-weight:500}
.mc{font-size:12px;padding:8px 16px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#f5f5f5;color:#333;font-family:inherit}
.hint{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 13px;font-size:11px;color:#92400e;line-height:1.7;margin-bottom:16px}
.stt{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="ht">🏗 정비사업 실무 에이전트</div>
    <div class="hs">도정법 기반 · 젠스파크 명령어 없음 · 에이전트 직접 실행</div>
  </div>
  <div style="font-size:11px;color:#888">재개발·재건축 전문</div>
</div>

<div class="stage-bar">
  <div class="sp on" onclick="setStage('all',this)">전체</div>
  <div class="sp" onclick="setStage('1',this)">1단계 기획·구역지정</div>
  <div class="sp" onclick="setStage('2',this)">2단계 조합구성</div>
  <div class="sp" onclick="setStage('3',this)">3단계 사업시행인가</div>
  <div class="sp" onclick="setStage('4',this)">4단계 관리처분</div>
  <div class="sp" onclick="setStage('5',this)">5단계 착공·완료</div>
</div>

<div class="wrap">

  <!-- 상황 진단 -->
  <div class="diag-box">
    <div class="sec-label">현재 상황 입력 → 단계 자동 진단 + 에이전트 추천</div>
    <div class="diag-row">
      <input class="diag-input" id="di" placeholder="예: 동의서 징구 중 / 감정평가 통보 받음 / 창립총회 준비 중…" onkeydown="if(event.key==='Enter')diag()">
      <button class="diag-btn" onclick="diag()">진단 →</button>
    </div>
    <div class="diag-result" id="dr"></div>
  </div>

  <!-- 통계 -->
  <div class="stat-row">
    <div class="stat-c"><div class="sn" style="color:#16a34a">647</div><div class="sl">확보 동의 수</div></div>
    <div class="stat-c"><div class="sn">2단계</div><div class="sl">현재 진행 단계</div></div>
    <div class="stat-c"><div class="sn">8종</div><div class="sl">실행 가능 에이전트</div></div>
  </div>

  <!-- 빠른 실행 힌트 -->
  <div class="hint">
    💡 <strong>사용법:</strong> 카드를 클릭하면 해당 에이전트 설명과 실행 방법이 표시됩니다. "Claude에서 실행" 버튼을 클릭하면 Claude 채팅창에서 해당 에이전트가 바로 실행됩니다.
  </div>

  <!-- 빠른 실행 -->
  <div class="stt">빠른 실행</div>
  <div class="quick-row">
    <button class="qb" onclick="openM('consent')">📋 전자동의서</button>
    <button class="qb" onclick="openM('sms')">📱 SMS 일괄발송</button>
    <button class="qb" onclick="openM('sim')">🧮 분담금 시뮬레이션</button>
    <button class="qb" onclick="openM('reg')">📄 설립등기 서류</button>
    <button class="qb" onclick="openM('ppt')">📊 총회 발표자료</button>
    <button class="qb" onclick="openM('scan')">🔍 AI 스캔 자동입력</button>
  </div>

  <!-- 에이전트 카드 -->
  <div class="stt" id="ag-title">전체 에이전트 (8종)</div>
  <div class="agent-grid" id="ag-grid"></div>

</div>

<!-- 모달 -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="mt"></h3>
    <p id="md"></p>
    <div class="steps" id="ms"></div>
    <div class="mbtn-row">
      <button class="ml" id="ml-btn">Claude에서 실행 →</button>
      <button class="mc" onclick="closeM()">닫기</button>
    </div>
  </div>
</div>

<script>
var curStage='all';

var agents=[
  {id:'consent',stage:'2',icon:'📋',name:'전자동의서 · 위임장 시스템',desc:'전자동의서·전자위임장·서면위임장 작성 및 동의율 실시간 집계. AI OCR 스캔 자동입력 포함.',tag:'2단계',tc:'t2'},
  {id:'sms',stage:'2',icon:'📱',name:'SMS 일괄발송 관리',desc:'그룹 필터링·템플릿 선택·발송비용 계산·예약발송·D-day 자동발송 통합 시스템.',tag:'2단계',tc:'t2'},
  {id:'reg',stage:'2',icon:'📄',name:'설립등기 서류 (법원 양식)',desc:'설립등기신청서·위임장·취임승낙서 — 실제 법원 양식 그대로 DOCX 생성. 스캔 자동입력 포함.',tag:'2단계',tc:'t2'},
  {id:'sim',stage:'4',icon:'🧮',name:'분담금 시뮬레이션',desc:'도정법 §74 기준 비례율·권리가액·분담금 자동 계산. 조합원 비교표·민감도 차트 포함.',tag:'4단계',tc:'t4'},
  {id:'ppt',stage:'4',icon:'📊',name:'총회 발표자료 (PPT 뷰어)',desc:'사업경과·자금계획·분담금·향후일정·의결안건 15장 슬라이드 인터랙티브 뷰어.',tag:'4단계',tc:'t4'},
  {id:'pptx',stage:'4',icon:'⬇️',name:'총회 PPT 실제 파일 생성',desc:'Midnight Executive 테마 15장 PPTX 파일 즉시 생성·다운로드. 파이차트·표·타임라인 포함.',tag:'4단계',tc:'t4'},
  {id:'flow',stage:'all',icon:'🗺',name:'정비사업 절차도 전체',desc:'재개발·재건축 1~5단계 전체를 인터랙티브 타임라인·법조문·소요기간으로 표시.',tag:'전 단계',tc:'tall'},
  {id:'scan',stage:'all',icon:'🔍',name:'AI 스캔 자동입력 (OCR)',desc:'서면 서류 업로드 → AI가 성명·주민번호·주소·면적 자동 인식 → 서류 탭에 즉시 적용.',tag:'공통',tc:'tall'},
];

var mData={
  consent:{title:'전자동의서 · 위임장 시스템',desc:'조합설립 동의서를 전자 방식으로 징구하고 동의율을 실시간 집계합니다. 전자위임장·서면위임장도 함께 제공합니다. 서면 서류는 스캔 후 AI OCR로 자동 입력됩니다.',steps:'① 전자동의서 탭 → 조합원 정보 입력 → 도정법 §35 기준 동의 항목 체크\n② 전자서명(마우스/터치) → 카카오·PASS·공동인증 선택 → 제출\n③ 동의율 실시간 업데이트 → SMS 발송 연동\n④ 서면 스캔 업로드 → OCR 자동 입력 → 조합원 DB 등록',cmd:'동의서 징구 파트에서 전자위임장과 전자동의서와 서류로 받는 위임장 양식만들어주고 서류 스캔부터 자동입력기능을 추가해줘'},
  sms:{title:'SMS 일괄발송 관리',desc:'조합원을 6개 그룹(전체·미동의·동의완료·위임장미제출·총회불참·분담금연체)으로 필터링하여 문자를 발송합니다. 예약·반복·D-day 자동발송을 지원합니다.',steps:'① 수신자 탭 → 그룹 필터 선택 → 대상 조합원 체크\n② 문자 작성 탭 → 템플릿 선택(4종) or 직접 작성\n③ 발송 비용 자동 계산(SMS 9원·LMS 30원) 확인\n④ 즉시발송 / 예약발송 / 테스트발송 선택',cmd:'SMS일괄발송관리 안내해줘'},
  reg:{title:'설립등기 서류 자동화 (법원 양식)',desc:'업로드된 실제 PDF 양식을 그대로 재현합니다. 설립등기신청서(접수란·세금·첨부서면)·위임장(케이탑 법무사)·취임승낙서가 5페이지 DOCX로 생성됩니다.',steps:'① 서류 탭 선택 → 설립등기신청서 / 위임장 / 취임승낙서\n② 빈칸 입력 → 조합명·주사무소·임원 정보\n③ AI 스캔 → 서면 서류 OCR 자동 입력\n④ 저장 → DOCX 다운로드 (즉시 출력 가능)',cmd:'내가 준 양식을 그대로 사용하게만들어줘'},
  sim:{title:'분담금 시뮬레이션',desc:'도정법 §74 기준으로 비례율·권리가액·분담금을 자동 계산합니다. 조합원 비교표, 비례율 민감도 슬라이더 차트를 제공합니다.',steps:'① 사업비 기본설정 탭 → 공사비·수입 입력 → 비례율 자동 산출\n② 개인 분담금 탭 → 종전자산 평가액·분양가 입력\n③ 조합원 비교표 탭 → 10인 일람표 자동 생성\n④ 민감도 탭 → 슬라이더 조정 → 분담금 변동 차트',cmd:'분담금 시뮬레이션 만들어줘'},
  ppt:{title:'총회 발표자료 PPT 뷰어',desc:'인터랙티브 슬라이드 뷰어로 15장 전체를 미리 확인합니다. 좌측 목차 클릭, 화살표 이동, 발표자 노트를 지원합니다.',steps:'① 좌측 목차 → 슬라이드 클릭 이동\n② 발표자 노트 확인 → 발표 리허설\n③ "PPTX 파일로 만들기" 버튼 → 실제 파일 생성\n④ PowerPoint에서 조합명 등 수정 후 사용',cmd:'총회 발표자료(PPT)구성도 만들어줘'},
  pptx:{title:'총회 PPT 실제 파일 생성',desc:'Midnight Executive 테마로 15장 PPTX 파일을 자동 생성합니다. 파이차트·표·가로 타임라인이 포함되며 즉시 다운로드됩니다.',steps:'① 명령 실행 → pptxgenjs로 자동 생성\n② 파이차트·분담금표·타임라인 포함 15장\n③ .pptx 다운로드 → PowerPoint에서 편집 가능',cmd:'총회 발표자료를 실제 PPTX 파일로 만들어줘'},
  flow:{title:'정비사업 절차도 전체',desc:'재개발·재건축 1~5단계 전체 절차를 인터랙티브 타임라인으로 확인합니다. 단계별 핵심 법조문, 소요기간, 주요 리스크가 포함됩니다.',steps:'① 5단계 타임라인 전체 조회\n② 단계별 핵심 법조문 확인\n③ 소요기간·리스크 항목 확인\n④ 하단 표 → 단계별 요약 정보',cmd:'전체'},
  scan:{title:'AI 스캔 자동입력 (OCR)',desc:'서면으로 받은 서류를 업로드하면 AI가 자동으로 내용을 인식하여 해당 서류 양식에 입력합니다.',steps:'① 이미지 또는 PDF 업로드 (드래그&드롭 가능)\n② AI OCR → 성명·주민번호·주소·면적·서명 자동 인식\n③ 신뢰도(%) 확인 후 필요 시 수정\n④ 적용 서류 선택 → 자동 입력 / 연명부 등록',cmd:'서류 스캔부터 자동입력기능을 추가해줘'},
};

var diagRules=[
  {kw:['동의서','동의율','동의 징구','서명','동의'],id:'consent',msg:'현재 <strong>2단계 — 조합구성</strong>에 계십니다. 가장 중요한 실무는 <strong>동의서 징구 및 동의율 관리</strong>입니다.'},
  {kw:['위임장','창립총회','조합설립','설립인가','등기'],id:'reg',msg:'현재 <strong>2단계 — 조합구성</strong>에 계십니다. 가장 중요한 실무는 <strong>설립등기 서류 준비 및 창립총회 개최</strong>입니다.'},
  {kw:['사업시행','설계','건축심의','시공사'],id:'sms',msg:'현재 <strong>3단계 — 사업시행인가</strong>에 계십니다. 가장 중요한 실무는 <strong>사업시행계획 수립 및 조합원 안내</strong>입니다.'},
  {kw:['감정평가','권리가액','분양신청','비례율','분담금','관리처분'],id:'sim',msg:'현재 <strong>4단계 — 관리처분인가</strong>에 계십니다. 가장 중요한 실무는 <strong>분담금 시뮬레이션 및 총회 발표자료</strong>입니다.'},
  {kw:['총회','안건','발표','PPT','슬라이드'],id:'ppt',msg:'현재 <strong>4단계 — 관리처분인가</strong>에 계십니다. 가장 중요한 실무는 <strong>조합원 총회 발표자료 준비</strong>입니다.'},
  {kw:['이주','철거','일반분양','착공','입주'],id:'sms',msg:'현재 <strong>5단계 — 착공·완료</strong>에 계십니다. 가장 중요한 실무는 <strong>이주 안내 및 일반분양 소통</strong>입니다.'},
  {kw:['문자','SMS','안내문','발송'],id:'sms',msg:'<strong>SMS 일괄발송 시스템</strong>이 필요한 상황입니다.'},
  {kw:['스캔','OCR','자동입력','촬영'],id:'scan',msg:'<strong>AI 스캔 자동입력</strong>이 필요한 상황입니다.'},
];

function render(){
  var f=curStage==='all'?agents:agents.filter(function(a){return a.stage===curStage||a.stage==='all';});
  document.getElementById('ag-title').textContent=(curStage==='all'?'전체':'단계별')+' 에이전트 ('+f.length+'종)';
  document.getElementById('ag-grid').innerHTML=f.map(function(a){
    return '<div class="ac" onclick="openM(\''+a.id+'\')">'
    +'<div class="ai">'+a.icon+'</div>'
    +'<div class="an">'+a.name+'</div>'
    +'<div class="ad">'+a.desc+'</div>'
    +'<span class="at '+a.tc+'">'+a.tag+'</span>'
    +'<div class="arr">→ 실행</div></div>';
  }).join('');
}

function setStage(s,el){
  curStage=s;
  document.querySelectorAll('.sp').forEach(function(p){p.classList.remove('on');});
  el.classList.add('on');
  render();
}

function diag(){
  var val=document.getElementById('di').value.trim();
  if(!val)return;
  var dr=document.getElementById('dr');
  var m=null;
  for(var i=0;i<diagRules.length;i++){
    for(var j=0;j<diagRules[i].kw.length;j++){
      if(val.indexOf(diagRules[i].kw[j])>=0){m=diagRules[i];break;}
    }
    if(m)break;
  }
  if(m){
    var ag=agents.find(function(a){return a.id===m.id;});
    dr.innerHTML=m.msg+'<br><br>▶ <strong>추천 에이전트:</strong> <span style="cursor:pointer;text-decoration:underline;color:#1d4ed8" onclick="openM(\''+m.id+'\')">'+ag.name+' →</span>';
  }else{
    dr.innerHTML='입력하신 내용으로 단계를 특정하기 어렵습니다.<br><strong>동의서, 감정평가, 총회, 이주</strong> 등의 키워드를 포함하여 다시 입력해 보세요.';
  }
  dr.style.display='block';
}

function openM(id){
  var d=mData[id];
  if(!d)return;
  document.getElementById('mt').textContent=d.title;
  document.getElementById('md').textContent=d.desc;
  document.getElementById('ms').innerHTML=d.steps.replace(/\n/g,'<br>');
  document.getElementById('ml-btn').setAttribute('data-cmd',d.cmd);
  document.getElementById('modal').classList.add('show');
}
function closeM(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM();});
document.getElementById('ml-btn').addEventListener('click',function(){
  var cmd=this.getAttribute('data-cmd');
  alert('Claude 채팅창에 아래 명령어를 붙여넣으세요:\n\n'+cmd);
  closeM();
});

render();
</script>
</body>
</html>
